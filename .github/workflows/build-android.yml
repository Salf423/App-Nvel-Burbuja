name: Build Android APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install .NET Android workload
      run: dotnet workload install android


    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      with:
        api-level: 33
        ndk-version: r26
        cmake-version: '3.22.1'      

    - name: Build Android App
      run: dotnet build AccelerometerEssential.Android/AccelerometerEssential.Android.csproj -c Release --no-restore
    - name: Create APK
      run: |
        dotnet publish AccelerometerEssential/AccelerometerEssential.Android/AccelerometerEssential.Android.csproj \
          -c Release \
          -f net6.0-android \
          -o ./publish \
          /p:AndroidBuildApplicationPackage=true \
          /p:AndroidGenerateNoSignatureApk=true


    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: accelerometer-apk
        path: |
          ./publish/**/*.apk
          ./publish/**/*.aab
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./publish/**/*.apk
          ./publish/**/*.aab
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Print build status
      if: success()
      run: |
        echo "Build completed successfully!"
        echo "APK available in artifacts"

    - name: Print build failure
      if: failure()
      run: |
        echo "Build failed - check logs above"
