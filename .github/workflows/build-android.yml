name: Build Android APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      with:
        api-level: 33
        ndk-version: r26
        cmake-version: '3.22.1'

    - name: Install .NET Android workload
      run: dotnet workload install android

    - name: Restore NuGet packages
      run: dotnet restore buendia/C#/AccelerometerEssential.Android.csproj

    - name: Build Android Project
      run: dotnet build buendia/C#/AccelerometerEssential.Android.csproj -c Release -v normal

    - name: Create APK
      run: |
        dotnet publish buendia/C#/AccelerometerEssential.Android.csproj \
          -c Release \
          -f net6.0-android \
          -o ./publish

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: accelerometer-apk
        path: |
          ./publish/**/*.apk
          ./publish/**/*.aab
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./publish/**/*.apk
          ./publish/**/*.aab
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Print build status
      if: success()
      run: |
        echo "✅ Build completed successfully!"
        echo "APK available in artifacts"
        
    - name: Print build failure
      if: failure()
      run: |
        echo "❌ Build failed - check logs above"
