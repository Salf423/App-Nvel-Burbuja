name: Build Android APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Install .NET Android workload
      run: dotnet workload install android

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Restore NuGet packages
      run: dotnet restore "buendia/C#/AccelerometerEssential.Android.csproj"

    - name: Build and publish APK
      run: |
        dotnet publish "buendia/C#/AccelerometerEssential.Android.csproj" \
          -c Release \
          -f net9.0-android \
          -o ./publish \
          /p:AndroidBuildApplicationPackage=true \
          /p:AndroidGeneratePackageSigningKey=true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: accelerometer-apk
        path: |
          ./publish/**/*.apk
          ./publish/**/*.aab
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./publish/**/*.apk
          ./publish/**/*.aab
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
